<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink:    #14161C;
    --panel:  #1B1E27;
    --line:   #333747;
    --paper:  #ECEEF3;
    --mute:   #9BA0B0;
    --cost:   #F0A65C;
    --save:   #5BC4B8;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(1100px 600px at 84% -12%, rgba(240,166,92,0.12), transparent 60%),
      radial-gradient(820px 520px at 4% 8%, rgba(91,196,184,0.08), transparent 55%),
      linear-gradient(180deg, #161922 0%, #14161C 100%);
    font-family: var(--sans);
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
  }

  /* AC waveform signature */
  .wave { position: absolute; inset: 0; width: 1200px; height: 630px; opacity: 0.5; }
  .wave path { fill: none; stroke-width: 1.6; }
  .wave .w-save { stroke: rgba(91,196,184,0.5); }
  .wave .w-cost { stroke: rgba(240,166,92,0.45); }

  .frame {
    position: absolute; inset: 0;
    padding: 84px 90px;
    display: flex; flex-direction: column;
    justify-content: space-between;
  }

  .brand { display: flex; align-items: center; gap: 22px; }
  .mark {
    width: 82px; height: 82px; border-radius: 19px;
    background: var(--ink);
    border: 1px solid var(--line);
    box-shadow: 0 18px 44px -22px rgba(0,0,0,0.8);
    display: grid; place-items: center;
  }
  .mark svg { width: 50px; height: 50px; }
  .wordmark { font-size: 66px; font-weight: 800; letter-spacing: -0.05em; line-height: 1; color: var(--paper); }

  .headline { max-width: 920px; }
  .headline h1 {
    font-size: 60px; font-weight: 800; letter-spacing: -0.035em;
    line-height: 1.08; color: var(--paper);
  }
  .headline .cost { color: var(--cost); }
  .headline p {
    margin-top: 24px;
    font-size: 30px; font-weight: 500; letter-spacing: -0.01em;
    color: var(--mute); line-height: 1.35; max-width: 30ch;
  }

  .chips { display: flex; align-items: center; gap: 13px; }
  .chip {
    display: inline-flex; align-items: center; gap: 11px;
    padding: 12px 20px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(15,17,22,0.5);
    font-size: 23px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--mute);
  }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; }
  .chip .dot--cost { background: var(--cost); box-shadow: 0 0 0 4px rgba(240,166,92,0.16); }
  .chip .dot--save { background: var(--save); box-shadow: 0 0 0 4px rgba(91,196,184,0.16); }
</style>
</head>
<body>
  <svg class="wave" viewBox="0 0 1200 630" preserveAspectRatio="none" aria-hidden="true">
    <path class="w-save" d="M-20 250 C 150 160, 300 340, 450 250 S 750 160, 900 250 S 1200 340, 1220 250"/>
    <path class="w-cost" d="M-20 320 C 150 230, 300 410, 450 320 S 750 230, 900 320 S 1200 410, 1220 320"/>
  </svg>

  <div class="frame">
    <div class="brand">
      <span class="mark">
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <rect x="1"  y="17" width="5" height="10" rx="1.5" fill="#5BC4B8"/>
          <rect x="9"  y="12" width="5" height="15" rx="1.5" fill="#5BC4B8"/>
          <rect x="17" y="8"  width="5" height="19" rx="1.5" fill="#F0A65C"/>
          <rect x="25" y="4"  width="5" height="23" rx="1.5" fill="#F0A65C"/>
        </svg>
      </span>
      <span class="wordmark">wattspend</span>
    </div>

    <div class="headline">
      <h1>See what each appliance<br>is <span class="cost">actually costing you.</span></h1>
      <p>Per month and per year, on your own electricity rate.</p>
    </div>

    <div class="chips">
      <span class="chip"><span class="dot dot--cost"></span>ranked by cost</span>
      <span class="chip"><span class="dot dot--save"></span>your rate</span>
      <span class="chip"><span class="dot dot--cost"></span>printable</span>
      <span class="chip"><span class="dot dot--save"></span>offline</span>
    </div>
  </div>
</body>
</html>
