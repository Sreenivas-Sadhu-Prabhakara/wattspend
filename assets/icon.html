<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #14161C; }
  body { display: grid; place-items: center; }
  /* 12% safe padding on each side -> mark fills the middle 76vmin */
  .mark { width: 76vmin; height: 76vmin; display: block; }
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 32 32" aria-hidden="true">
    <rect x="2"  y="18" width="5" height="9"  rx="1.6" fill="#5BC4B8"/>
    <rect x="10" y="12" width="5" height="15" rx="1.6" fill="#5BC4B8"/>
    <rect x="18" y="7"  width="5" height="20" rx="1.6" fill="#F0A65C"/>
    <rect x="26" y="3"  width="5" height="24" rx="1.6" fill="#F0A65C"/>
  </svg>
</body>
</html>
